name: Build and Push GHCR Images

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - 'config.example.json'
      - '.vscode/**'
      - '.idea/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for Docker images (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve GHCR repo
        id: repo
        run: |
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${OWNER}/kiro-rs" >> "$GITHUB_OUTPUT"

      - name: Determine version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-6)"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
            echo "version=${RAW_VERSION#v}" >> "$GITHUB_OUTPUT"
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=beta-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build timestamp
        id: build_meta
        shell: bash
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          provenance: false
          tags: |
            ${{ steps.repo.outputs.image }}:${{ steps.version.outputs.version }}-${{ matrix.arch }}
            ${{ steps.repo.outputs.image }}:${{ steps.version.outputs.sha_tag }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Kiro.rs Docker Image
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ steps.build_meta.outputs.created }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image and version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          OWNER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-6)"
          echo "image=ghcr.io/${OWNER}/kiro-rs" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
            echo "version=${RAW_VERSION#v}" >> "$GITHUB_OUTPUT"
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=beta-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA_TAG: ${{ steps.meta.outputs.sha_tag }}
          IS_BETA: ${{ steps.meta.outputs.is_beta }}
        run: |
          set -euo pipefail

          docker manifest create "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64"
          docker manifest push "${IMAGE}:${VERSION}"

          docker manifest create "${IMAGE}:${SHA_TAG}" \
            "${IMAGE}:${SHA_TAG}-amd64"
          docker manifest push "${IMAGE}:${SHA_TAG}"

          if [ "${IS_BETA}" = "true" ]; then
            docker manifest create "${IMAGE}:beta" \
              "${IMAGE}:${VERSION}-amd64"
            docker manifest push "${IMAGE}:beta"
          else
            docker manifest create "${IMAGE}:latest" \
              "${IMAGE}:${VERSION}-amd64"
            docker manifest push "${IMAGE}:latest"
          fi
