server {
    listen 80;
    server_name rs-test.43-225-196-10.sslip.io;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/rs-test.43-225-196-10.sslip.io;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name rs-test.43-225-196-10.sslip.io;

    ssl_certificate /etc/letsencrypt/live/rs-test.43-225-196-10.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rs-test.43-225-196-10.sslip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:KIRO_RS_TEST_SSL:10m;
    ssl_session_timeout 10m;

    access_log /www/wwwlogs/rs-test.43-225-196-10.sslip.io.log combined;
    error_log /www/wwwlogs/rs-test.43-225-196-10.sslip.io.error.log;

    client_max_body_size 100m;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/rs-test.43-225-196-10.sslip.io;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:8991;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
